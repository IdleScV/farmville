services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farmville
      POSTGRES_USER: farmville
      POSTGRES_PASSWORD: farmville_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/server/src/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
